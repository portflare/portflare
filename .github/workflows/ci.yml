name: ci

on:
  push:
    paths:
      - '**.go'
      - 'go.mod'
      - 'go.sum'
      - 'examples/docker/**'
      - '.github/workflows/ci.yml'
  pull_request:
    paths:
      - '**.go'
      - 'go.mod'
      - 'go.sum'
      - 'examples/docker/**'
      - '.github/workflows/ci.yml'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Cache Go build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-

      - name: Run go test
        run: go test ./...

      - name: Build binaries
        run: make build VERSION=ci COMMIT=${GITHUB_SHA::7}

  docker-build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        dockerfile:
          - examples/docker/server.Dockerfile
          - examples/docker/client.Dockerfile
          - examples/docker/app-with-embedded-client.Dockerfile
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: false
          load: false
          build-args: |
            VERSION=ci
            COMMIT=${{ github.sha }}
            BUILD_DATE=${{ github.event.head_commit.timestamp || github.run_id }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
