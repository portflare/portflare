name: release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-binaries:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
          - goos: windows
            goarch: amd64
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: reverse-helper/go.mod

      - name: Build release artifacts
        working-directory: reverse-helper
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          set -eux
          mkdir -p dist
          suffix=""
          if [ "$GOOS" = "windows" ]; then
            suffix=".exe"
          fi

          server_bin="reverse-server-${GOOS}-${GOARCH}${suffix}"
          client_bin="reverse-client-${GOOS}-${GOARCH}${suffix}"
          archive_base="portflare-${GOOS}-${GOARCH}"

          CGO_ENABLED=0 go build -o "dist/${server_bin}" ./cmd/reverse-server
          CGO_ENABLED=0 go build -o "dist/${client_bin}" ./cmd/reverse-client

          mkdir -p "dist/${archive_base}"
          cp "dist/${server_bin}" "dist/${archive_base}/"
          cp "dist/${client_bin}" "dist/${archive_base}/"
          cp README.md "dist/${archive_base}/README.md"
          cp -R docs "dist/${archive_base}/docs"
          cp -R examples "dist/${archive_base}/examples"

          if [ "$GOOS" = "windows" ]; then
            (cd dist && zip -r "${archive_base}.zip" "${archive_base}")
          else
            tar -C dist -czf "dist/${archive_base}.tar.gz" "${archive_base}"
          fi

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.goos }}-${{ matrix.goarch }}
          path: |
            reverse-helper/dist/*.tar.gz
            reverse-helper/dist/*.zip
            reverse-helper/dist/reverse-server-*
            reverse-helper/dist/reverse-client-*

  github-release:
    runs-on: ubuntu-latest
    needs: build-binaries
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/*
          generate_release_notes: true
