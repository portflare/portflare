# Deprecated example name kept for compatibility.
# Prefer compose.sidecar.example.yml for a clearer sidecar setup.
services:
  reverse-server:
    build:
      context: ../..
      dockerfile: examples/docker/server.Dockerfile
    environment:
      REVERSE_SERVER_LISTEN_ADDR: ":8080"
      REVERSE_BASE_DOMAIN: "reverse.example.test"
      REVERSE_STATE_PATH: "/data/state.json"
      REVERSE_ADMIN_USERS: "admin"
      # Local testing only: disable auth headers and impersonate a local admin user.
      # REVERSE_DISABLE_AUTH: "true"
      # REVERSE_LOCAL_DEV_USER: "alice-smith"
      # REVERSE_LOCAL_DEV_EMAIL: "alice@example.com"
      # Optional approval controls:
      # REVERSE_ALLOW_USER_APP_APPROVAL: "true"
      # REVERSE_AUTO_APPROVE_APPS_FOR_USERS: "false"
      # REVERSE_AUTO_APPROVE_APPS_FOR_ADMINS: "true"
    volumes:
      - portflare-data:/data
    ports:
      - "8080:8080"

  sample-app:
    image: node:22-bookworm-slim
    working_dir: /app
    command: ["sh","-lc","npx http-server -p 3000"]

  reverse-client:
    build:
      context: ../..
      dockerfile: examples/docker/client.Dockerfile
    network_mode: service:sample-app
    environment:
      REVERSE_SERVER_URL: "http://reverse-server:8080"
      REVERSE_CLIENT_KEY: "replace-me"
      REVERSE_CLIENT_LISTEN_ADDR: "127.0.0.1:9901"
    depends_on:
      - sample-app

volumes:
  portflare-data:
